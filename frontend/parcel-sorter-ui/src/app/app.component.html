<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-toolbar color="primary">
      <mat-icon>local_post_office</mat-icon>
      <span>NPS Sorter</span>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/parcels" routerLinkActive="active-link">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Parcels</span>
      </a>
      <a mat-list-item routerLink="/register" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_box</mat-icon>
        <span matListItemTitle>Register Parcel</span>
      </a>
      <a mat-list-item routerLink="/upload" routerLinkActive="active-link">
        <mat-icon matListItemIcon>upload_file</mat-icon>
        <span matListItemTitle>Upload CSV</span>
      </a>
      <a mat-list-item routerLink="/rules" routerLinkActive="active-link">
        <mat-icon matListItemIcon>rule</mat-icon>
        <span matListItemTitle>Sorting Rules</span>
      </a>
      <a mat-list-item routerLink="/ai" routerLinkActive="active-link">
        <mat-icon matListItemIcon>smart_toy</mat-icon>
        <span matListItemTitle>AI Assistant</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="main-content">
    <mat-toolbar color="primary">
      <span>Terminal Parcel Sorting System</span>
    </mat-toolbar>
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
