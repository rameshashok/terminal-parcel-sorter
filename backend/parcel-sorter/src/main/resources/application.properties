quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${SUPABASE_DB_USER:postgres}
quarkus.datasource.password=${SUPABASE_DB_PASSWORD:your-password}
quarkus.datasource.jdbc.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/parcel_sorter}
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=5
quarkus.datasource.jdbc.acquisition-timeout=30
quarkus.datasource.jdbc.idle-removal-interval=PT1M
quarkus.datasource.jdbc.max-lifetime=PT5M

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=db/seed.sql
quarkus.hibernate-orm.log.sql=false

kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

mp.messaging.outgoing.parcel-events-out.connector=smallrye-kafka
mp.messaging.outgoing.parcel-events-out.topic=parcel-events
mp.messaging.outgoing.parcel-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.parcel-events-out.health-enabled=false

mp.messaging.incoming.parcel-events-in.connector=smallrye-kafka
mp.messaging.incoming.parcel-events-in.topic=parcel-events
mp.messaging.incoming.parcel-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.parcel-events-in.group.id=parcel-sorter-group
mp.messaging.incoming.parcel-events-in.auto.offset.reset=earliest
mp.messaging.incoming.parcel-events-in.retry=true
mp.messaging.incoming.parcel-events-in.retry.attempts=5
mp.messaging.incoming.parcel-events-in.health-enabled=false
mp.messaging.incoming.parcel-events-in.failure-strategy=ignore

kafka.topic.parcel-events.partitions=1
kafka.topic.parcel-events.replication-factor=1

quarkus.langchain4j.openai.base-url=https://openrouter.ai/api/v1
quarkus.langchain4j.openai.api-key=${OPENROUTER_API_KEY:dummy-key}
quarkus.langchain4j.openai.chat-model.model-id=${OPENROUTER_MODEL:google/gemma-3-4b-it:free}
quarkus.langchain4j.openai.chat-model.max-tokens=500
quarkus.langchain4j.openai.chat-model.enabled=true
quarkus.langchain4j.openai.embedding-model.model-id=openai/text-embedding-3-small
quarkus.langchain4j.openai.embedding-model.enabled=true
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# Disable dev services - we provide our own connections
quarkus.langchain4j.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.kafka.devservices.enabled=false

quarkus.http.port=8081
quarkus.live-reload.port=8082
