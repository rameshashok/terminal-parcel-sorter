<mat-card>
  <mat-card-header><mat-card-title>Sorting Rules (RAG Knowledge Base)</mat-card-title></mat-card-header>
  <mat-card-content>
    <form (ngSubmit)="create()" #f="ngForm" class="rule-form">
      <mat-form-field><mat-label>Rule Code</mat-label><input matInput [(ngModel)]="newRule.ruleCode" name="ruleCode" required></mat-form-field>
      <mat-form-field><mat-label>Description</mat-label><input matInput [(ngModel)]="newRule.description" name="description" required></mat-form-field>
      <mat-form-field><mat-label>Postal Pattern</mat-label><input matInput [(ngModel)]="newRule.postalCodePattern" name="postalCodePattern" required></mat-form-field>
      <mat-form-field><mat-label>Belt</mat-label><input matInput [(ngModel)]="newRule.assignedBelt" name="assignedBelt" required></mat-form-field>
      <mat-form-field><mat-label>Priority</mat-label><input matInput type="number" [(ngModel)]="newRule.priority" name="priority" required></mat-form-field>
      <mat-checkbox [(ngModel)]="newRule.active" name="active">Active</mat-checkbox>
      <button mat-raised-button color="primary" type="submit" [disabled]="f.invalid">Add Rule</button>
    </form>

    <mat-table [dataSource]="rules" class="w-full">
      <ng-container matColumnDef="ruleCode"><mat-header-cell *matHeaderCellDef>Code</mat-header-cell><mat-cell *matCellDef="let r">{{ r.ruleCode }}</mat-cell></ng-container>
      <ng-container matColumnDef="postalCodePattern"><mat-header-cell *matHeaderCellDef>Postal Pattern</mat-header-cell><mat-cell *matCellDef="let r">{{ r.postalCodePattern }}</mat-cell></ng-container>
      <ng-container matColumnDef="assignedBelt"><mat-header-cell *matHeaderCellDef>Belt</mat-header-cell><mat-cell *matCellDef="let r">{{ r.assignedBelt }}</mat-cell></ng-container>
      <ng-container matColumnDef="priority"><mat-header-cell *matHeaderCellDef>Priority</mat-header-cell><mat-cell *matCellDef="let r">{{ r.priority }}</mat-cell></ng-container>
      <ng-container matColumnDef="active"><mat-header-cell *matHeaderCellDef>Active</mat-header-cell><mat-cell *matCellDef="let r"><mat-icon [color]="r.active ? 'primary' : ''">{{ r.active ? 'check_circle' : 'cancel' }}</mat-icon></mat-cell></ng-container>
      <ng-container matColumnDef="actions"><mat-header-cell *matHeaderCellDef>Actions</mat-header-cell><mat-cell *matCellDef="let r"><button mat-icon-button color="warn" (click)="delete(r)"><mat-icon>delete</mat-icon></button></mat-cell></ng-container>
      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>
  </mat-card-content>
</mat-card>
