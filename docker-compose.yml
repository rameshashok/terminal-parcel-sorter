services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: parcel_sorter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  backend:
    build:
      context: ./backend/parcel-sorter
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SUPABASE_DB_URL: jdbc:postgresql://postgres:5432/parcel_sorter
      SUPABASE_DB_USER: postgres
      SUPABASE_DB_PASSWORD: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-3-4b-it:free}
      QUARKUS_KAFKA_DEVSERVICES_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  seed:
    image: pgvector/pgvector:pg16
    depends_on:
      backend:
        condition: service_started
    environment:
      PGPASSWORD: postgres
    entrypoint: >
      bash -c "
        until pg_isready -h postgres -U postgres; do sleep 2; done;
        sleep 10;
        psql -h postgres -U postgres -d parcel_sorter -c \"
          CREATE EXTENSION IF NOT EXISTS vector;
          INSERT INTO sorting_rules (id, rulecode, description, postalcodepattern, assignedbelt, priority, active)
          SELECT nextval('sorting_rules_seq'), rulecode, description, postalcodepattern, assignedbelt, priority, active
          FROM (VALUES
            ('RULE-001','North region parcels under 5kg','1%','Belt-A',10,true),
            ('RULE-002','South region parcels','2%','Belt-B',10,true),
            ('RULE-003','East region parcels','3%','Belt-C',10,true),
            ('RULE-004','West region parcels','4%','Belt-D',10,true),
            ('RULE-005','Fragile/oversized parcels over 20kg','5%','Belt-E',20,true),
            ('RULE-006','Express delivery parcels','6%','Belt-F',30,true)
          ) AS v(rulecode,description,postalcodepattern,assignedbelt,priority,active)
          WHERE NOT EXISTS (SELECT 1 FROM sorting_rules LIMIT 1);
        \"
      "
    restart: "no"

  frontend:
    build:
      context: ./frontend/parcel-sorter-ui
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  kafka_data:
