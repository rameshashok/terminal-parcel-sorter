name: Terraform

on:
  # Validate on any PR that touches terraform
  pull_request:
    paths: ['terraform/**']

  # Also validate when terraform changes land on main
  push:
    branches: [main]
    paths: ['terraform/**']

  # Manual apply — human-in-the-loop for infrastructure changes
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: plan
        type: choice
        options: [plan, apply]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: us-east-1
  TF_VAR_openrouter_api_key: ${{ secrets.TF_VAR_OPENROUTER_API_KEY }}

defaults:
  run:
    working-directory: terraform

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || 'validate' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.5'

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Write SSH public key to a temp file so terraform can reference it
      - name: Write SSH public key
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          echo "${{ secrets.EC2_SSH_PUBLIC_KEY }}" > /tmp/ec2_key.pub
          echo "TF_VAR_public_key_path=/tmp/ec2_key.pub" >> $GITHUB_ENV

      - name: Terraform Plan
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          terraform init
          terraform plan -out=tfplan \
            -var="public_key_path=${TF_VAR_public_key_path}"

      - name: Upload plan artifact
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

      - name: Terraform Apply
        if: >
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.action == 'apply' &&
          env.AWS_ACCESS_KEY_ID != ''
        run: terraform apply -auto-approve tfplan
